<script>
    // Snow animation
    function createSnowflakes() {
        const snowContainer = document.getElementById('snowContainer');
        const snowflake = document.createElement('div');
        snowflake.className = 'snowflake';
        snowflake.style.left = Math.random() * window.innerWidth + 'px';
        snowflake.style.animationDuration = Math.random() * 3 + 2 + 's';
        snowflake.style.opacity = Math.random();
        snowContainer.appendChild(snowflake);

        setTimeout(() => {
            snowflake.remove();
        }, 5000);
    }

    // Create snowflakes periodically
    setInterval(createSnowflakes, 300);
</script>
<script>
    // JavaScript to get and display the current date
    const dateElement = document.getElementById('current-date');
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    
    // This will show: Friday, March 13, 2026
    dateElement.textContent = new Date().toLocaleDateString('en-IN', options);
</script>

<script>
    // Thirukkural Daily Quote Functionality
    async function loadThirukkural() {
        try {
            const response = await fetch('thirukkural.json');
            const data = await response.json();
            
            // Get current day of year (1-366) to select Thirukkural
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 0);
            const diff = now - start;
            const dayOfYear = Math.floor(diff / (1000 * 60 * 60 * 24));
            
            // Select Thirukkural based on day (modulo 1330 since there are 1330 Thirukkural)
            const kuralIndex = (dayOfYear % data.kural.length);
            const selectedKural = data.kural[kuralIndex];
            
            // Display the Thirukkural
            const dailyQuoteElement = document.getElementById('dailyQuote');
            dailyQuoteElement.innerHTML = `
                <h3><strong>Thirukkural ${selectedKural.Number}:</strong></h1>
                <strong><em>${selectedKural.Line1}</em></strong><br>
                <strong><em>${selectedKural.Line2}</em></strong><br>
                <br>

                <strong>Explanation:</strong> ${selectedKural.mv}
            `;
            
        } catch (error) {
            console.error('Error loading Thirukkural:', error);
            document.getElementById('dailyQuote').textContent = 'Unable to load daily Thirukkural';
        }
    }
    
    // Load Thirukkural when page loads
    loadThirukkural();
</script>
